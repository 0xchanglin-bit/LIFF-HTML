<html lang="zh-Hant">

    :root {
      --bg: #f3f4f6;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --primary: #6d8f63;
      --primary-dark: #5e7d55;
      --primary-soft: #eef4ec;
      --danger: #c24141;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 14px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family:

    body {
      min-height: 100vh;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: stretch;
      justify-content: center;
      background:
        linear-gradient(to bottom, rgba(0, 0, 0, 0.06), rgba(0, 0, 0, 0.02)),
        var(--bg);
      padding: 0;
    }

    .sheet {
      width: 100%;
      max-width: 560px;
      min-height: 100vh;
      background: var(--card);
      border-radius: 0;
      box-shadow: none;
      overflow: hidden;
      position: relative;
    }

    @media (min-width: 640px) {
      .page {
        padding: 24px;
      }

      .sheet {
        min-height: auto;
        border-radius: 28px;
        box-shadow: var(--shadow);
      }
    }

    .sheet-header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(229, 231, 235, 0.7);
      padding: 18px 20px 14px;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .title-wrap {
      flex: 1;
      text-align: center;
    }

    .title {
      margin: 0;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 0.02em;
    }

    .subtitle {
      margin-top: 4px;
      font-size: 12px;
      color: #9ca3af;
    }

    .icon-btn {
      width: 42px;
      height: 42px;
      border: 0;
      border-radius: 999px;
      background: #f3f4f6;
      color: #374151;
      font-size: 22px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .icon-btn:active {
      transform: scale(0.98);
    }

    .sheet-body {
      padding: 18px 18px 130px;
    }

    .search-box {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #f7f7f8;
      border: 1px solid #f0f1f3;
      border-radius: 18px;
      padding: 14px 16px;
      margin-bottom: 18px;
    }

    .search-icon {
      font-size: 20px;
      color: var(--primary);
      flex-shrink: 0;
    }

    .search-box input {
      width: 100%;
      border: 0;
      outline: none;
      background: transparent;
      font-size: 16px;
      color: var(--text);
    }

    .search-box input::placeholder {
      color: #9ca3af;
    }

    .field-group {
      margin-bottom: 16px;
      border-bottom: 1px solid rgba(229, 231, 235, 0.7);
      padding-bottom: 16px;
    }

    .field-label {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 10px;
      font-size: 16px;
      font-weight: 800;
      color: #20242a;
    }

    .required {
      color: var(--danger);
      font-weight: 800;
    }

    .select-wrap,
    .textarea-wrap {
      position: relative;
    }

    select,
    textarea {
      width: 100%;
      appearance: none;
      -webkit-appearance: none;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #fff;
      color: var(--text);
      font-size: 16px;
      outline: none;
    }

    select {
      height: 54px;
      padding: 0 44px 0 16px;
      cursor: pointer;
    }

    textarea {
      min-height: 110px;
      padding: 14px 16px;
      resize: vertical;
      line-height: 1.6;
    }

    select:focus,
    textarea:focus,
    .search-box:focus-within {
      border-color: rgba(109, 143, 99, 0.35);
      box-shadow: 0 0 0 4px rgba(109, 143, 99, 0.12);
    }

    .search-box:focus-within {
      background: #fff;
    }

    .chevron {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: #4b5563;
      font-size: 16px;
    }

    .hint {
      margin-top: 8px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
    }

    .bottom-bar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 20;
      padding: 12px 16px calc(env(safe-area-inset-bottom) + 12px);
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(14px);
      border-top: 1px solid rgba(229, 231, 235, 0.85);
    }

    .bottom-inner {
      width: 100%;
      max-width: 560px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .btn {
      height: 56px;
      border-radius: 18px;
      font-size: 18px;
      font-weight: 800;
      border: 1.5px solid transparent;
      cursor: pointer;
      transition: 0.18s ease;
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: #fff;
      color: var(--primary);
      border-color: var(--primary);
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
      box-shadow: 0 8px 20px rgba(109, 143, 99, 0.28);
    }

    .btn-primary:active,
    .btn-secondary:active {
      transform: translateY(1px);
    }

    .loading {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 99;
      background: rgba(17, 24, 39, 0.34);
      backdrop-filter: blur(3px);
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .loading.show {
      display: flex;
    }

    .loading-card {
      width: 100%;
      max-width: 300px;
      background: #fff;
      border-radius: 22px;
      padding: 24px 20px;
      text-align: center;
      box-shadow: var(--shadow);
    }

    .spinner {
      width: 42px;
      height: 42px;
      margin: 0 auto 14px;
      border-radius: 999px;
      border: 4px solid #e5e7eb;
      border-top-color: var(--primary);
      animation: spin 0.9s linear infinite;
    }

    .loading-title {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .loading-text {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.6;
    }

      position: fixed;
      left: 50%;
      bottom: 110px;
      transform: translateX(-50%) translateY(12px);
      width: calc(100% - 32px);
      max-width: 420px;
      background: rgba(17, 24, 39, 0.92);
      color: #fff;
      padding: 14px 16px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.5;
      z-index: 80;
      opacity: 0;
      pointer-events: none;
      transition: 0.2s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

      to {

</head>

    }

    function resetForm() {
      keywordInput.value = "";
      descriptionInput.value = "";
      citySelect.value = "";
      serviceSelect.value = "";
      districtSelect.disabled = true;
      fillSelect(districtSelect, [], "請先選擇縣市");
    }

    async function initLiff() {
      try {
        await liff.init({ liffId: LIFF_ID });
      } catch (error) {
        console.error("LIFF 初始化失敗：", error);
        showToast("頁面初始化失敗，請稍後再試");
      }
    }

    async function handleSubmit() {
      const city = citySelect.value;
      const district = districtSelect.value;
      const service = serviceSelect.value;
      const keyword = keywordInput.value.trim();
      const description = descriptionInput.value.trim();

      if (!city) {
        showToast("請先選擇縣市");
        return;
      }

      if (!district) {
        showToast("請選擇區域");
        return;
      }

      if (!service) {
        showToast("請選擇服務內容");
        return;
      }

      if (!liff.isInClient()) {
        showToast("請從 LINE 內開啟此頁面");
        return;
      }

      try {
        setLoading(true);

        const context = liff.getContext();
        const userId = context && context.userId;

        if (!userId) {
          throw new Error("無法取得 LINE 使用者資訊");
        }

        const finalDescription = [keyword, description].filter(Boolean).join("｜");

        const response = await fetch(API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            userId,
            city,
            district,
            service,
            description: finalDescription
          })
        });

        const result = await response.json();

        if (!response.ok || !result.success) {
          throw new Error(result.message || "搜尋失敗，請稍後再試");
        }

        showToast("條件已送出，請回 LINE 查看結果");
        setTimeout(() => {
          liff.closeWindow();
        }, 700);
      } catch (error) {
        console.error("送出搜尋失敗：", error);
        showToast(error.message || "送出失敗，請稍後再試");
      } finally {
        setLoading(false);
      }
    }

    closeBtn.addEventListener("click", () => {
      if (window.liff && liff.isInClient()) {
        liff.closeWindow();
      } else {
        window.history.back();
      }
    });

    citySelect.addEventListener("change", updateDistrictOptions);
    resetBtn.addEventListener("click", resetForm);
    submitBtn.addEventListener("click", handleSubmit);

    initCityOptions();
    initServiceOptions();
    resetForm();
    initLiff();
  </script>
</body>
</html>
